<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>For Andrea</title>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            background: black;
        }
    </style>
</head>
<body>

<canvas id="canvas" width="800" height="800"></canvas>

<audio id="musica" autoplay loop>
    <source src="audio/musica.mp3" type="audio/mpeg">
</audio>


<script>
let regions = [];
let angle = 0;

async function init(jsonFile) {
    const response = await fetch(jsonFile);
    regions = await response.json();
    startDrawing();
}

function startDrawing() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.imageSmoothingEnabled = false;

    // Calcular límites
    let min_x = Infinity;
    let max_x = -Infinity;
    let min_y = Infinity;
    let max_y = -Infinity;

    for (const region of regions) {
        for (const p of region.contour) {
            if (p[0] < min_x) min_x = p[0];
            if (p[0] > max_x) max_x = p[0];
            if (p[1] < min_y) min_y = p[1];
            if (p[1] > max_y) max_y = p[1];
        }
    }

    const width = max_x - min_x;
    const height = max_y - min_y;

    const scale = Math.min(600 / width, 600 / height);
    const center_x = (min_x + max_x) / 2;
    const center_y = (min_y + max_y) / 2;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();

        // 🔥 ROTACIÓN
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(angle);

        for (const region of regions) {

            const color = `rgb(${region.color[0]}, ${region.color[1]}, ${region.color[2]})`;

            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 0.5;

            const points = region.contour;

            ctx.beginPath();

            let x = (points[0][0] - center_x) * scale;
            let y = (center_y - points[0][1]) * scale;

            ctx.moveTo(x, y);

            for (let i = 1; i < points.length; i++) {
                x = (points[i][0] - center_x) * scale;
                y = (center_y - points[i][1]) * scale;
                ctx.lineTo(x, y);
            }

            ctx.lineTo(
                (points[0][0] - center_x) * scale,
                (center_y - points[0][1]) * scale
            );

            ctx.fill();
            ctx.stroke();
        }

        ctx.restore();

        // 🔥 velocidad de giro (ajusta aquí)
        angle += 0.01;

        requestAnimationFrame(draw);
    }

    draw();
}

// Ejecutar
init("resources/sunflowers.json");
</script>


</body>
</html>
