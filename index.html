<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>For Andrea</title>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            background: black;
        }
    </style>
</head>
<body>

<canvas id="canvas" width="800" height="800"></canvas>

<audio id="musica" autoplay loop>
    <source src="audio/musica.mp3" type="audio/mpeg">
</audio>


<script>
async function drawFromJSON(jsonFile) {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 Mejora: desactivar suavizado
    ctx.imageSmoothingEnabled = false;

    // Cargar JSON
    const response = await fetch(jsonFile);
    const regions = await response.json();

    let min_x = Infinity;
    let max_x = -Infinity;
    let min_y = Infinity;
    let max_y = -Infinity;
    
    for (const region of regions) {
        for (const p of region.contour) {
            if (p[0] < min_x) min_x = p[0];
            if (p[0] > max_x) max_x = p[0];
            if (p[1] < min_y) min_y = p[1];
            if (p[1] > max_y) max_y = p[1];
        }
    }

    // Escala y centro (igual que tu Python)
    const width = max_x - min_x;
    const height = max_y - min_y;

    const scale = Math.min(600 / width, 600 / height);
    const center_x = (min_x + max_x) / 2;
    const center_y = (min_y + max_y) / 2;

    // Limpiar canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 🔥 (Opcional PRO) invertir orden si se ve raro
    // regions.reverse();

    // Dibujar cada región
    for (const region of regions) {

        const color = `rgb(${region.color[0]}, ${region.color[1]}, ${region.color[2]})`;

        ctx.fillStyle = color;
        ctx.strokeStyle = color;   // 🔥 borde
        ctx.lineWidth = 0.5;       // 🔥 grosor borde

        const points = region.contour;

        ctx.beginPath();

        // Primer punto
        let x = (points[0][0] - center_x) * scale + canvas.width / 2;
        let y = (center_y - points[0][1]) * scale + canvas.height / 2;

        ctx.moveTo(x, y);

        // Resto de puntos
        for (let i = 1; i < points.length; i++) {
            x = (points[i][0] - center_x) * scale + canvas.width / 2;
            y = (center_y - points[i][1]) * scale + canvas.height / 2;
            ctx.lineTo(x, y);
        }

        // 🔥 cierre manual (más preciso que closePath)
        ctx.lineTo(
            (points[0][0] - center_x) * scale + canvas.width / 2,
            (center_y - points[0][1]) * scale + canvas.height / 2
        );

        ctx.fill();
        ctx.stroke(); // 🔥 dibuja borde
    }
}

// Ejecutar
drawFromJSON("resources/sunflowers.json");
</script>

</body>
</html>
